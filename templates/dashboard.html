{% extends "base.html" %}

{% block content %}
<!-- Hero Section -->
<div class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold mb-3">Welcome back, {{ username }}!</h1>
        <p class="lead mb-4">Keep pushing your limits. Every workout counts.</p>
    </div>
</div>

<div class="container">
    <div class="row g-4 justify-content-center">
        <!-- Stats Cards -->
        <div class="col-md-4">
            <div class="card h-100 shadow text-center">
                <div class="card-body py-5">
                    <i class="fas fa-running fa-4x text-primary mb-4"></i>
                    <h5 class="card-title">Total Workouts</h5>
                    <h2 class="display-4 fw-bold text-primary">{{ workouts_count }}</h2>
                    <p class="text-muted">Sessions logged</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow text-center">
                <div class="card-body py-5">
                    <i class="fas fa-bullseye fa-4x text-success mb-4"></i>
                    <h5 class="card-title">Active Goals</h5>
                    <h2 class="display-4 fw-bold text-success">{{ goals_count }}</h2>
                    <p class="text-muted">Fitness targets</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-9">
            <div class="d-grid gap-3">
                <a href="/log_workout" class="btn btn-primary btn-lg py-4">
                    <i class="fas fa-plus me-2"></i> Log a New Workout
                </a>
                <a href="/workouts" class="btn btn-outline-primary btn-lg py-4">
                    <i class="fas fa-list me-2"></i> View My Workouts
                </a>
                <a href="/goals" class="btn btn-success btn-lg py-4">
                    <i class="fas fa-trophy me-2"></i> Manage My Goals
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
